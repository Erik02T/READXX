version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: readxx-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: readxx
      POSTGRES_USER: readxx
      POSTGRES_PASSWORD: devpassword
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U readxx"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: readxx-redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass devredis
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: readxx-backend
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      POSTGRES_URL: jdbc:postgresql://postgres:5432/readxx
      POSTGRES_USER: readxx
      POSTGRES_PASSWORD: devpassword
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: devredis
      JWT_SECRET: "dev-secret-key-minimum-32-characters-long-!!!"
      HIBERNATE_DDL_AUTO: update
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
