spring:
  datasource:
    url: ${POSTGRES_URL}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    hikari:
      connection-test-query: "SELECT 1"
      maximum-pool-size: 20
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    out-of-order: false
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD:}
      ssl: ${REDIS_SSL:true}

server:
  http2:
    enabled: true
  servlet:
    context-path: /
  error:
    include-stacktrace: never
    include-message: always

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized

readxx:
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiry: 900
    refresh-token-expiry: 2592000
  cors:
    allowed-origins: ${ALLOWED_ORIGINS:}
  tts:
    openai-api-key: ${OPENAI_API_KEY:}
    daily-limit-free: 10000
    daily-limit-premium: 500000
  ocr:
    max-image-size-bytes: 10485760
    max-image-dimension: 8000
  audit:
    enabled: true
    log-sensitive-events: true

logging:
  level:
    root: INFO
    com.readxx: INFO
