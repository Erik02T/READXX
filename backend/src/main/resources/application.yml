spring:
  datasource:
    url: ${POSTGRES_URL}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    # ✓ Require SSL/TLS for database connections
    hikari:
      connection-test-query: "SELECT 1"
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: ${HIBERNATE_DDL_AUTO:validate}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD:}
      # ✓ Redis SSL/TLS (if needed in production)
      ssl: ${REDIS_SSL:false}
  # ✓ Request size limits — prevent DoS via large payloads
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  # ✓ Security headers
  http2:
    enabled: true
  servlet:
    context-path: /
  error:
    # ✓ Never return stack traces in error responses
    include-stacktrace: never
    include-message: always

management:
  # ✓ Expose only health and prometheus metrics
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized

readxx:
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiry: 900
    refresh-token-expiry: 2592000
  cors:
    allowed-origins: ${ALLOWED_ORIGINS:}
  tts:
    openai-api-key: ${OPENAI_API_KEY:}
    daily-limit-free: 10000
    daily-limit-premium: 500000
  ocr:
    max-image-size-bytes: 10485760
    max-image-dimension: 8000
  audit:
    # ✓ Immutable audit logging
    enabled: true
    log-sensitive-events: true
