name: CI/CD Pipeline

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main, develop]

jobs:
  frontend-build:
    name: Build Frontend Extension
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - uses: actions/checkout@v3

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build extension
        run: npm run build

      - name: Verify no API keys in dist
        run: |
          if grep -r "sk-" dist/ 2>/dev/null; then
            echo "❌ ERROR: API keys found in build output!"
            exit 1
          fi
          echo "✅ No API keys detected"

      - name: Verify no eval() in dist
        run: |
          if grep -r "eval(" dist/ 2>/dev/null; then
            echo "❌ ERROR: eval() found in build output!"
            exit 1
          fi
          echo "✅ No eval() detected"

      - name: Verify CSP in manifest
        run: |
          if ! grep -q "script-src 'self'" dist/manifest.json; then
            echo "❌ ERROR: CSP not properly configured in manifest!"
            exit 1
          fi
          echo "✅ CSP correctly configured"

      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: extension-dist-${{ matrix.node-version }}
          path: dist
          retention-days: 5

  backend-build:
    name: Build & Test Backend
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java-version: [21]

    steps:
      - uses: actions/checkout@v3

      - name: Set up Java ${{ matrix.java-version }}
        uses: actions/setup-java@v3
        with:
          java-version: ${{ matrix.java-version }}
          distribution: 'temurin'
          cache: maven

      - name: Build backend with Maven
        run: |
          cd backend
          mvn clean package

      - name: Verify JAR created
        run: |
          if [ ! -f "backend/target/readxx-backend-0.0.1-SNAPSHOT.jar" ]; then
            echo "❌ ERROR: Backend JAR not created!"
            exit 1
          fi
          echo "✅ Backend JAR created successfully"

      - name: Run security checks
        run: |
          cd backend

          # Check for eval() usage
          if grep -r "eval(" src/ 2>/dev/null; then
            echo "❌ ERROR: eval() found in backend code!"
            exit 1
          fi

          # Check for hardcoded API keys
          if grep -r "sk-" src/ 2>/dev/null; then
            echo "❌ ERROR: API keys found in backend code!"
            exit 1
          fi

          echo "✅ Security checks passed"

      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: backend-jar-${{ matrix.java-version }}
          path: backend/target/*.jar
          retention-days: 5

  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: backend-build

    steps:
      - uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./backend/Dockerfile
          push: false
          tags: readxx-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [frontend-build, backend-build, security-scan, docker-build]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v3

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "⚠️ RAILWAY_TOKEN not configured - skipping Railway deployment"
            echo "To enable automated deployment:"
            echo "1. Create a Railway token at https://railway.app/account/tokens"
            echo "2. Add RAILWAY_TOKEN secret in GitHub Settings > Secrets"
            exit 0
          fi

          echo "Deploying to Railway..."
          # Railway deployment commands would go here

      - name: Notify deployment
        run: echo "✅ Deployment completed"
